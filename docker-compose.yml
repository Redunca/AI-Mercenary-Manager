services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: mercenai
      POSTGRES_PASSWORD: mercenai
      POSTGRES_DB: mercenai
    ports:
      - "5432:5432"
    volumes:
      - mercenai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercenai -d mercenai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mercenai_pg_data:
