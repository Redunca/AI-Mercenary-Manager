<div *ngIf="node.type === 'leaf'" class="leaf">
  <app-terminal-panel [panel]="layout.panels[node.panelId]"></app-terminal-panel>
</div>

<div *ngIf="node.type === 'split'" class="split" [class.row]="node.direction === 'row'"
  [class.column]="node.direction === 'column'">
  <app-layout-node [node]="node.children[0]"></app-layout-node>
  <app-layout-node [node]="node.children[1]"></app-layout-node>
</div>
